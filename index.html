<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>3D CSS Slider</title>

    <link rel="stylesheet" href="./style.css">

</head>

<body>

    <div class="banner">

        <div class="slider" style="--quantity: 12">

            <div class="item" style="--position: 1">
                <img src="./img/img1.jpg" alt="">
            </div>

            <div class="item" style="--position: 2">
                <img src="./img/img2.jpg" alt="">
            </div>

            <div class="item" style="--position: 3">
                <img src="./img/img3.jpeg" alt="">
            </div>

            <div class="item" style="--position: 4">
                <img src="./img/img4.jpg" alt="">
            </div>

            <div class="item" style="--position: 5">
                <img src="./img/img5.webp" alt="">
            </div>

            <div class="item" style="--position: 6">
                <img src="./img/img6.webp" alt="">
            </div>

            <div class="item" style="--position: 7">
                <img src="./img/img7.webp" alt="">
            </div>

            <div class="item" style="--position: 8">
                <img src="./img/img8.jpg" alt="">
            </div>

            <div class="item" style="--position: 9">
                <img src="./img/img9.jpg" alt="">
            </div>

            <div class="item" style="--position: 10">
                <img src="./img/img10.jpg" alt="">
            </div>

            <div class="item" style="--position: 11">
                <img src="./img/img11.jpg" alt="">
            </div>

            <div class="item" style="--position: 12">
                <img src="./img/img12.jpg" alt="">
            </div>

        </div>

        <div class="content">

            <h1 data-content="CSS ONLY">
                CSS ONLY
            </h1>

            <div class="author">

                <h2>Using CSS 3D Transforms</h2>

                <p>
                    <b>Web Design</b>
                </p>

                <p>
                    Pure CSS 3D image slider using transforms,
                    perspective, and animations.
                </p>

            </div>

            <div class="model"></div>

        </div>

    </div>

</body>

</html>
